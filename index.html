<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hannah Pet Hospital | Total Lifetime Care™</title>
  <meta name="description" content="Total Lifetime Care™ for the moments that matter most. Hannah is here for them." />

  <style>
    :root {
      --blue: #51b5e0;
      --navy: #1f3b54;
      --cream: #fbf7ee;
      --cream-2: #fffdf8;
      --charcoal: #202020;
      --muted: #68645f;
      --line: rgba(32,32,32,0.1);
      --white: #ffffff;
      --shadow: 0 26px 80px rgba(31,59,84,0.12);
      --radius: 24px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      line-height: 1.5;
    }

    a { color: inherit; }
    h1, h2, h3, p { margin-top: 0; }

    .modal-toggle { display: none; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(31,59,84,0.62);
      backdrop-filter: blur(10px);
    }

    .modal-toggle:checked ~ .modal { display: flex; }

    .modal-card {
      position: relative;
      width: min(100%, 460px);
      background: var(--white);
      border-radius: 30px;
      padding: 30px;
      box-shadow: 0 30px 90px rgba(31,59,84,0.28);
      border: 1px solid rgba(31,59,84,0.08);
    }

    .modal-card h2 {
      font-size: 30px;
      line-height: 1.05;
      color: var(--navy);
      margin-bottom: 18px;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 18px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(31,59,84,0.08);
      color: var(--navy);
      font-weight: 1000;
      cursor: pointer;
    }

    .modal-card button {
      width: 100%;
      border: 0;
      margin-top: 8px;
      cursor: pointer;
      background: var(--navy);
</html>
